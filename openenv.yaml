tasks:
  - name: complete_workflow
    description: Complete all API tasks successfully
    grader:
      type: final_state
      condition:
        completed_tasks: ["auth", "payment", "notify"]

  - name: correct_order
    description: Ensure APIs are called in correct order
    grader:
      type: state_check
      condition:
        last_error: null

  - name: efficiency
    description: Complete within minimal steps
    grader:
      type: numeric
      field: step_count
      operator: "<="
      value: 5